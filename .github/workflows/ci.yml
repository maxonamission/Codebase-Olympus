# CI-workflow voor Codebase-Olympus.
# Laag 4 van de ontwikkelstraat: dezelfde checks als pre-commit (OS-03),
# maar draait op een schone server en is niet te omzeilen met --no-verify.

name: CI

on:
  push:
  pull_request:
    branches: [main]

# Annuleer oudere runs op dezelfde branch zodra er een nieuwe binnenkomt.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Create venv
        run: uv venv --python ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Debug — versies
        run: |
          uv --version
          uv run python --version
          uv run ruff --version
          uv run mypy --version

      - name: Ruff lint
        run: uv run ruff check . --output-format=github

      - name: Ruff format check
        run: uv run ruff format --check --diff .

      - name: Mypy (strict op src/)
        run: uv run mypy src/

      - name: Stories-consistentie (full)
        run: uv run python scripts/check_story_status.py --mode=full --ac-gate=error --format-gate=error

      - name: Regenerate-status drift
        run: uv run python scripts/regenerate_status.py --check

      - name: Diataxis doc-standaard (warn-only)
        run: uv run python scripts/check_diataxis.py --glob 'docs/**/*.md' --glob 'PROJECTSTATUS.md' --glob 'EPICS.md'

      - name: Codebase-standards drift
        run: |
          uv run python scripts/check_standard_drift.py \
            --manifest .codebase-standards-manifest.json \
            --sync-map .codebase-standards-sync.json

      - name: Pytest met coverage
        run: uv run pytest --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14
          if-no-files-found: ignore
